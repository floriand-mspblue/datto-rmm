# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - datto-rmm-mcp-server

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Install pnpm
        run: npm install -g pnpm@9.14.2

      - name: Install dependencies
        run: pnpm install

      - name: Sync OpenAPI spec
        run: pnpm sync:openapi

      - name: Generate API clients
        run: pnpm generate:api

      - name: Build project
        run: pnpm build

      - name: Prepare deployment package
        run: |
          pnpm --filter=datto-rmm-mcp-server deploy --prod apps/mcp-server/deploy


      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: apps/mcp-server/deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_FB16AE98B9264B4FB38D508439C7A624 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_7A79197470264E11B15E51F58C3C9011 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_0D3EBE251508481C9A7C5F91E3829467 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'datto-rmm-mcp-server'
          slot-name: 'Production'
          package: .

          

